<!DOCTYPE html>
<html>
<head>
<title>Snacks Menu</title>
<style>
body{
  font-family:Arial;
  text-align:center;
  background:linear-gradient(to right,#fbc2a3,#f8b6c1);
  margin:0;
  padding:20px;
}
h1{color:#ff6b81; margin-bottom:20px;}

.container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.item{
  background:white;
  width:180px;
  margin:15px;
  padding:10px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.item img{
  width:100%;
  height:120px;
  border-radius:10px;
}

.item h3{
  color:#ff6b81;
  margin:10px 0 5px 0;
}

.item p{
  margin:0;
  font-weight:bold;
}
</style>
</head>
<body>

<h1>🍔 Snacks</h1>

<div class="container">
  <div class="item">
    <img src="https://images.unsplash.com/photo-1604908177522-2aa0b29b3a4b">
    <h3>Burger</h3>
    <p>₹120</p>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1551218808-94e220e084d2">
    <h3>Fries</h3>
    <p>₹90</p>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1598514982610-9f8ee234aeb2">
    <h3>Sandwich</h3>
    <p>₹100</p>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1603073500840-d54d0df89b9a">
    <h3>Pizza Slice</h3>
    <p>₹150</p>
  </div>
</div>

</body>
</html>
