<!DOCTYPE html>
<html>
<head>
  <title>Desserts Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      font-family:Arial; 
      text-align:center; 
      background:linear-gradient(to right,#fbc2a3,#f8b6c1); 
      margin:0; 
      padding:20px;
    }
    h1{color:#ff6b81; margin-bottom:20px;}
    .container{
      display:flex; 
      flex-wrap:wrap; 
      justify-content:center;
    }
    .item{
      background:white; 
      width:180px; 
      margin:15px; 
      padding:10px; 
      border-radius:10px; 
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }
    .item img{
      width:100%; 
      height:120px; 
      border-radius:10px;
    }
    .item h3{
      color:#ff6b81; 
      margin:10px 0 5px 0;
    }
    .item p{
      margin:0; 
      font-weight:bold;
    }
  </style>
</head>
<body>

<h1>🍰 Desserts</h1>

<div class="container">
  <div class="item">
    <img src="https://images.unsplash.com/photo-1601924582973-4c0f072d72b0">
    <h3>Cake</h3>
    <p>₹150</p>
  </div>
  <div class="item">
    <img src="https://images.unsplash.com/photo-1565958011703-44b85c26c7de">
    <h3>Ice Cream</h3>
    <p>₹100</p>
  </div>
  <div class="item">
    <img src="https://images.unsplash.com/photo-1599785209790-9983d2653dcf">
    <h3>Brownie</h3>
    <p>₹120</p>
  </div>
  <div class="item">
    <img src="https://images.unsplash.com/photo-1600788870553-19d12e591e02">
    <h3>Pastry</h3>
    <p>₹80</p>
  </div>
</div>

</body>
</html>
